name: Guard Test (API-based, no checkout)

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted, dismissed]

jobs:
  check-sensitive-files:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      statuses: write
    env:
      SENSITIVE_FILES: ".claude/ AGENTS.md"
      STATUS_CONTEXT: "AI Config Guard"
    steps:
      - name: Resolve Pull Request Metadata
        id: metadata
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "head_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"
          echo "Resolved PR #${PR_NUMBER}, HEAD SHA: ${HEAD_SHA}"

      - name: Check if sensitive AI configs or workflows changed
        id: check_sensitive_files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.metadata.outputs.pr_number }}
        run: |
          SENSITIVE_FILES_UPDATED=false
          MODIFIED_FILES=""

          CHANGED_FILES=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/files" \
            --paginate --jq '.[] | .filename, (.previous_filename // empty)')

          echo "=== Changed files ==="
          echo "$CHANGED_FILES"

          for file in $SENSITIVE_FILES; do
            if echo "$CHANGED_FILES" | grep -qF "$file"; then
              echo "Sensitive file detected: $file"
              SENSITIVE_FILES_UPDATED=true
              MODIFIED_FILES="${MODIFIED_FILES}- \`${file}\`"$'\n'
            fi
          done

          echo "detected=${SENSITIVE_FILES_UPDATED}" >> "$GITHUB_OUTPUT"
          echo ""
          echo "=== Sensitive files detected: ${SENSITIVE_FILES_UPDATED} ==="

      - name: Set status — no sensitive files changed
        if: steps.check_sensitive_files.outputs.detected != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ steps.metadata.outputs.head_sha }}
          REPO: ${{ github.repository }}
        run: |
          gh api "repos/${REPO}/statuses/${HEAD_SHA}" \
            -f state=success \
            -f context="${STATUS_CONTEXT}" \
            -f description="No sensitive AI config files changed"

      - name: Post result comment
        if: steps.check_sensitive_files.outputs.detected == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.metadata.outputs.pr_number }}
          HEAD_SHA: ${{ steps.metadata.outputs.head_sha }}
          REPO: ${{ github.repository }}
        run: |
          gh pr comment "$PR_NUMBER" --body "**Guard Test**: Sensitive files detected — approval required."
          gh api "repos/${REPO}/statuses/${HEAD_SHA}" \
            -f state=failure \
            -f context="${STATUS_CONTEXT}" \
            -f description="Sensitive AI config files changed — requires approval"
